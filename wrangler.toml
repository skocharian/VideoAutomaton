name = "video-automaton"
main = "src/worker.ts"
compatibility_date = "2024-12-01"

[observability]
enabled = true
head_sampling_rate = 1

[vars]
R2_BUCKET_NAME = "video-automaton-assets"

# KV namespace for job state
[[kv_namespaces]]
binding = "KV_JOBS"
id = "75c1043e16d84d59a04ccddbd84777b5"
preview_id = "8b8477b4dd074337a70acf8feb5b925d"

# R2 bucket for assets
[[r2_buckets]]
binding = "R2_ASSETS"
bucket_name = "video-automaton-assets"

[[containers]]
class_name = "BackgroundAnalyzer"
image = "./Dockerfile.background-analyzer"
max_instances = 2

[[durable_objects.bindings]]
name = "BACKGROUND_ANALYZER"
class_name = "BackgroundAnalyzer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BackgroundAnalyzer"]

# NOTIFY_WEBHOOK_URL is set as a secret:
#   wrangler secret put NOTIFY_WEBHOOK_URL

# CREATOMATE_API_KEY should be set as a secret:
#   wrangler secret put CREATOMATE_API_KEY

# Optional direct-to-R2 browser uploads to avoid Worker 413 limits:
#   wrangler secret put R2_ACCOUNT_ID
#   wrangler secret put R2_ACCESS_KEY_ID
#   wrangler secret put R2_SECRET_ACCESS_KEY

# Serve frontend as static assets
# Deploy frontend/ to Cloudflare Pages, or use the assets directory:
[site]
bucket = "./frontend"
