name = "video-automaton"
main = "src/worker.ts"
compatibility_date = "2024-12-01"

# KV namespace for job state
[[kv_namespaces]]
binding = "KV_JOBS"
id = "75c1043e16d84d59a04ccddbd84777b5"
preview_id = "8b8477b4dd074337a70acf8feb5b925d"

# R2 bucket for assets
[[r2_buckets]]
binding = "R2_ASSETS"
bucket_name = "video-automaton-assets"

# Environment variables (set secrets via `wrangler secret put`)
[vars]
TEMPLATE_9X16_ID = "ae7226f1-f69c-483b-9cb4-7db0045539bc"
TEMPLATE_4X5_ID = "ae7226f1-f69c-483b-9cb4-7db0045539bc"
# NOTIFY_WEBHOOK_URL is set as a secret:
#   wrangler secret put NOTIFY_WEBHOOK_URL

# CREATOMATE_API_KEY should be set as a secret:
#   wrangler secret put CREATOMATE_API_KEY

# Serve frontend as static assets
# Deploy frontend/ to Cloudflare Pages, or use the assets directory:
[site]
bucket = "./frontend"
